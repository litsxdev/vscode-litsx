name: Release

on:
  workflow_run:
    workflows:
      - Validate Extension
    types:
      - completed
  workflow_dispatch:
    inputs:
      pre_release:
        description: Publish as pre-release
        type: boolean
        required: false
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Detect Ready Release
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.gate.outputs.ready }}
      has_changesets: ${{ steps.pending.outputs.has_changesets }}
    steps:
      - name: Wait for validation workflow
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === "workflow_dispatch") {
              core.setOutput("ready", context.ref === "refs/heads/main" ? "true" : "false");
              return;
            }

            const { owner, repo } = context.repo;
            const branch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;
            const eventName = context.payload.workflow_run.event;

            if (branch !== "main" || eventName !== "push") {
              core.setOutput("ready", "false");
              return;
            }

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              branch,
              event: eventName,
              status: "completed",
              per_page: 100,
            });

            const run = data.workflow_runs.find((candidate) =>
              candidate.name === "Validate Extension" && candidate.head_sha === headSha,
            );

            core.setOutput("ready", run?.conclusion === "success" ? "true" : "false");

      - name: Checkout repository
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', 'package.json', '.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        run: corepack yarn install --immutable

      - name: Detect pending changesets
        id: pending
        if: steps.gate.outputs.ready == 'true' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish Extension
    needs: plan
    if: |
      needs.plan.outputs.ready == 'true' &&
      (needs.plan.outputs.has_changesets == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.LITSX_APP_CLIENT_ID }}
          private-key: ${{ secrets.LITSX_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - name: Checkout extension repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', 'package.json', '.yarnrc.yml') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Materialize release version
        if: needs.plan.outputs.has_changesets == 'true'
        run: corepack yarn changeset:version

      - name: Refresh lockfile after versioning
        if: needs.plan.outputs.has_changesets == 'true'
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: corepack yarn install

      - name: Commit release version updates
        id: version_commit
        env:
          RELEASE_PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A
          if git diff --cached --quiet; then
            echo "No version updates to commit"
            echo "created_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): version extension [skip ci]"
          echo "created_commit=true" >> "$GITHUB_OUTPUT"

      - name: Push release version commit
        if: steps.version_commit.outputs.created_commit == 'true'
        run: git push origin HEAD:main

      - name: Run tests
        run: corepack yarn test

      - name: Package VSIX
        run: corepack yarn package:vsix

      - name: Attest VSIX
        uses: actions/attest@v4
        with:
          subject-path: dist/*.vsix

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pre_release || 'false' }}" = "true" ]; then
            ./node_modules/.bin/vsce publish --no-dependencies --pre-release
          else
            ./node_modules/.bin/vsce publish --no-dependencies
          fi

      - name: Create release tag
        run: node scripts/release/create-release-tag.mjs

      - name: Push release tag
        run: git push origin --tags

      - name: Read release metadata
        id: release_meta
        run: |
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          files: dist/*.vsix
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pre_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
