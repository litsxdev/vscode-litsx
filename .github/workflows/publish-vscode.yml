name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      pre-release:
        description: Publish as pre-release
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: publish-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    env:
      LITSX_SOURCE_DIR: vendor/litsx
    steps:
      - name: Checkout extension repository
        uses: actions/checkout@v6

      - name: Checkout LitSX source repository
        uses: actions/checkout@v6
        with:
          repository: litsxdev/litsx
          path: vendor/litsx

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate

      - name: Cache Yarn state
        uses: actions/cache@v5
        with:
          path: |
            .yarn/install-state.gz
            .yarn-cache
          key: ${{ runner.os }}-yarn4-${{ hashFiles('yarn.lock', '.yarnrc.yml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn4-

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Build extension
        run: corepack yarn build

      - name: Package VSIX
        run: corepack yarn package:vsix

      - name: Attest VSIX
        uses: actions/attest@v4
        with:
          subject-path: dist/*.vsix

      - name: Publish extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ "${{ github.event.inputs.pre-release }}" = "true" ]; then
            ./node_modules/.bin/vsce publish --no-dependencies --pre-release
          else
            ./node_modules/.bin/vsce publish --no-dependencies
          fi
